name: Check Code Quality

# Run this pipeline automatically on every push or pull request
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint HTML and JavaScript
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Download the repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Install Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3 - Install linting tools (eslint + htmlhint)
      - name: Install dependencies
        run: npm install

      # Step 4 - Check HTML for mistakes
      - name: Lint HTML
        run: npm run lint:html

      # Step 5 - Check JavaScript for mistakes
      - name: Lint JavaScript
        run: npm run lint:js
